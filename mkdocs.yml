site_name: Agent 365 SDK Handbook
site_description: A beginner-to-advanced, hands-on Python curriculum for building, governing, and shipping enterprise agents on Microsoft Agent 365.
site_author: mail2raji
site_url: https://mail2raji.github.io/agent-365-sdk-handbook/
repo_url: https://github.com/mail2raji/agent-365-sdk-handbook
repo_name: mail2raji/agent-365-sdk-handbook
edit_uri: edit/main/

# `docs/` is generated by `python tools/sync_docs.py` from the curriculum source
# (top-level README + Phase*/README.md + Phase*/exercises.md). Re-run the script
# whenever the source changes; the GitHub Actions workflow re-runs it on every push.
docs_dir: docs
site_dir: _site

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mail2raji
  generator: false

nav:
  - Home: README.md
  - Setup:
      - Install everything: SETUP.md
      - Glossary: GLOSSARY.md
  - "Phase 0 — Setup":
      - Overview: Phase0_Setup/README.md
      - Exercises: Phase0_Setup/exercises.md
  - "Phase 1 — Foundations":
      - Overview: Phase1_Foundations/README.md
      - Exercises: Phase1_Foundations/exercises.md
  - "Phase 2 — Activities & Handlers":
      - Overview: Phase2_Activities_and_Handlers/README.md
      - Exercises: Phase2_Activities_and_Handlers/exercises.md
  - "Phase 3 — State & Storage":
      - Overview: Phase3_State_and_Storage/README.md
      - Exercises: Phase3_State_and_Storage/exercises.md
  - "Phase 4 — Rich Messaging":
      - Overview: Phase4_Rich_Messaging/README.md
      - Exercises: Phase4_Rich_Messaging/exercises.md
  - "Phase 5 — LLM Integration":
      - Overview: Phase5_LLM_Integration/README.md
      - Exercises: Phase5_LLM_Integration/exercises.md
  - "Phase 6 — Tools & RAG":
      - Overview: Phase6_Tools_and_RAG/README.md
      - Exercises: Phase6_Tools_and_RAG/exercises.md
  - "Phase 7 — Channels, Teams & Auth":
      - Overview: Phase7_Channels_Teams_Auth/README.md
      - Exercises: Phase7_Channels_Teams_Auth/exercises.md
  - "Phase 8 — Agent 365 Enterprise":
      - Overview: Phase8_Agent365_Enterprise/README.md
      - Exercises: Phase8_Agent365_Enterprise/exercises.md
  - "Phase 9 — Testing & Deployment":
      - Overview: Phase9_Testing_and_Deployment/README.md
      - Exercises: Phase9_Testing_and_Deployment/exercises.md
  - "Phase 10 — Capstone":
      - Overview: Phase10_Capstone/README.md
      - Exercises: Phase10_Capstone/exercises.md
  - "Phase 11 — Wrap with Agent 365 (Lab)":
      - Overview: Phase11_Wrap_with_Agent365/README.md
      - Exercises: Phase11_Wrap_with_Agent365/exercises.md
